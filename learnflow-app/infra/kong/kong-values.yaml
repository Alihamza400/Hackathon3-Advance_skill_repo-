# Kong Helm values for LearnFlow production deployment
# Deploys Kong Gateway with Ingress Controller, Postgres-backed

image:
  repository: kong/kong-gateway
  tag: "3.7"
  pullPolicy: IfNotPresent

enterprise:
  enabled: false
  vitals:
    enabled: false
  portal:
    enabled: false
  rbac:
    enabled: false
  smtp:
    enabled: false

env:
  database: postgres
  pg_host: kong-postgresql.kong.svc.cluster.local
  pg_port: "5432"
  pg_user: kong
  pg_password: kong
  pg_database: kong
  pg_ssl: "on"
  pg_ssl_verify: "on"
  log_level: notice
  proxy_listen: "0.0.0.0:8000 http2, 0.0.0.0:8443 http2 ssl"
  admin_listen: "0.0.0.0:8001 http2, 0.0.0.0:8444 http2 ssl"
  status_listen: "0.0.0.0:8100"
  cluster_listen: "0.0.0.0:8005"
  declarative_config: /kong_dbless/kong.yaml

# Ingress Controller configuration
ingressController:
  enabled: true
  image:
    repository: kong/kubernetes-ingress-controller
    tag: "3.1"
  env:
    publish_service: kong/kong-proxy
    kong_admin_url: http://localhost:8001
  rbac:
    create: true
  serviceAccount:
    create: true

proxy:
  enabled: true
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
  http:
    enabled: true
    servicePort: 80
    containerPort: 8000
  https:
    enabled: true
    servicePort: 443
    containerPort: 8443
  ingress:
    enabled: true
    hostname: api.learnflow.app
    path: /
    pathType: Prefix
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 512Mi

admin:
  enabled: true
  type: ClusterIP
  http:
    enabled: true
    servicePort: 8001
    containerPort: 8001
  https:
    enabled: true
    servicePort: 8444
    containerPort: 8444
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

manager:
  enabled: false

portal:
  enabled: false

portalapi:
  enabled: false

postgresql:
  enabled: true
  postgresqlUsername: kong
  postgresqlPassword: kong
  postgresqlDatabase: kong
  replication:
    enabled: true
    slaveReplicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi

waitImage:
  repository: kong/kong
  tag: "3.7"
  pullPolicy: IfNotPresent

migrations:
  enabled: true
  preUpgrade: true
  postUpgrade: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

replicaCount: 2
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: "50%"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8100"

extraLabels:
  app.kubernetes.io/part-of: learnflow
  app.kubernetes.io/managed-by: helm

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s

ingressController:
  ingressClass: kong
  watchNamespaces:
    - learnflow
    - default
  watchSecrets:
    - kong/kong-proxy-tls
  env:
    anonymous_reports: "false"
    feature_flags_response_header: "true"

# DB-less mode for declarative config (fallback)
dblessConfig:
  enabled: false

customIngress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: kong
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: api.learnflow.app
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - api.learnflow.app
      secretName: kong-proxy-tls

plugins:
  configMaps: []
  secrets: []
