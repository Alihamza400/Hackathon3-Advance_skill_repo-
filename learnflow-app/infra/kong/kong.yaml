_format_version: "3.0"
_transform: true

services:
  - name: auth-service
    host: auth.learnflow.svc.cluster.local
    port: 8000
    protocol: http
    path: /
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 5
    routes:
      - name: auth-routes
        paths:
          - /api/v1/auth
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
        strip_path: false
        preserve_host: false
        protocols:
          - http
          - https
        regex_priority: 0
    plugins:
      - name: rate-limiting
        config:
          minute: 20
          policy: local
      - name: jwt
        config:
          claims_to_verify:
            - exp
          secret_is_base64: false
          uri_param_names:
            - jwt
          cookie_names: []
          key_claim_name: iss
          maximum_expiration: 0
    healthchecks:
      active:
        type: http
        http_path: /health/ready
        timeout: 5
        healthy:
          interval: 15
          successes: 2
        unhealthy:
          interval: 30
          http_failures: 5
          tcp_failures: 3
          timeouts: 3
      passive:
        type: http
        healthy:
          successes: 3
        unhealthy:
          http_failures: 3
          tcp_failures: 3
          timeouts: 3

