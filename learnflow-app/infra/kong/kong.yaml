plugins:
  - name: cors
    service: null
    route: null
    consumer: null
    enabled: true
    protocols:
      - http
      - https
    config:
      origins:
        - http://localhost:3000
        - https://learnflow.app
        - https://*.learnflow.app
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - Dapr-Token
        - X-Request-ID
        - X-Correlation-ID
      exposed_headers:
        - X-Request-ID
        - X-Correlation-ID
        - X-RateLimit-Limit
        - X-RateLimit-Remaining
      credentials: true
      max_age: 3600
      preflight_continue: false
