apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: learning-events
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: 604800000
    retention.bytes: 1073741824
    cleanup.policy: delete
    compression.type: snappy
