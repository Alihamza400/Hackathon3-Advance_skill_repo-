# Enterprise Kafka Configuration for LearnFlow
replicaCount: 3

image:
  registry: docker.io
  repository: bitnami/kafka
  tag: 3.6.1-debian-12-r0
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 2Gi

zookeeper:
  replicaCount: 3
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  persistence:
    enabled: true
    size: 10Gi
    storageClass: "gp3"

persistence:
  enabled: true
  size: 50Gi
  storageClass: "gp3"

service:
  type: ClusterIP
  port: 9092

listeners:
  external:
    type: loadbalancer
  internal:
    type: clusterip

security:
  allowPlaintextListener: false
  interBrokerProtocol: SSL
  clientProtocol: SSL

metrics:
  kafka:
    enabled: true
    jmxExporter:
      enabled: true
      port: 7071

configurationOverrides:
  "auto.create.topics.enable": "true"
  "num.partitions": "12"
  "default.replication.factor": "3"
  "min.insync.replicas": "2"
  "log.retention.hours": "168"
  "log.segment.bytes": "1073741824"
  "log.retention.check.interval.ms": "300000"
  "compression.type": "snappy"
  "unclean.leader.election.enable": "false"
  "auto.leader.rebalance.enable": "true"

# LearnFlow specific topics
topics:
  - name: learning.events
    partitions: 12
    replicationFactor: 3
    config:
      cleanup.policy: compact
      retention.ms: 2592000000
  - name: code.executions
    partitions: 12
    replicationFactor: 3
    config:
      cleanup.policy: delete
      retention.ms: 604800000
  - name: exercise.submissions
    partitions: 12
    replicationFactor: 3
    config:
      cleanup.policy: delete
      retention.ms: 2592000000
  - name: struggle.alerts
    partitions: 6
    replicationFactor: 3
    config:
      cleanup.policy: delete
      retention.ms: 604800000
  - name: progress.updates
    partitions: 12
    replicationFactor: 3
    config:
      cleanup.policy: compact
      retention.ms: 2592000000
  - name: exercise.generation
    partitions: 6
    replicationFactor: 3
    config:
      cleanup.policy: delete
      retention.ms: 604800000
  - name: notifications
    partitions: 6
    replicationFactor: 3
    config:
      cleanup.policy: delete
      retention.ms: 604800000