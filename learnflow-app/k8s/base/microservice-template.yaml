# Base Deployment Template for LearnFlow Microservices
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{SERVICE_NAME}}
  namespace: learnflow
  labels:
    app: {{SERVICE_NAME}}
    app.kubernetes.io/name: {{SERVICE_NAME}}
    app.kubernetes.io/component: microservice
    app.kubernetes.io/part-of: learnflow
    app.kubernetes.io/managed-by: dapr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: {{SERVICE_NAME}}
  template:
    metadata:
      labels:
        app: {{SERVICE_NAME}}
        app.kubernetes.io/name: {{SERVICE_NAME}}
        dapr.io/enabled: "true"
        dapr.io/app-id: "{{SERVICE_NAME}}"
        dapr.io/app-port: "8000"
        dapr.io/config: "appconfig"
        dapr.io/log-level: "info"
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "{{SERVICE_NAME}}"
        dapr.io/app-port: "8000"
        dapr.io/config: "appconfig"
    spec:
      serviceAccountName: learnflow-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: {{SERVICE_NAME}}
        image: {{SERVICE_IMAGE}}
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        env:
        - name: SERVICE_NAME
          value: "{{SERVICE_NAME}}"
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: learnflow-config
              key: LOG_LEVEL
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: learnflow-config
              key: KAFKA_BROKERS
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: learnflow-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: learnflow-config
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: learnflow-config
              key: POSTGRES_DB
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: learnflow-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: learnflow-config
              key: REDIS_PORT
        - name: DAPR_HTTP_PORT
          valueFrom:
            configMapKeyRef:
              name: learnflow-config
              key: DAPR_HTTP_PORT
        - name: DAPR_GRPC_PORT
          valueFrom:
            configMapKeyRef:
              name: learnflow-config
              key: DAPR_GRPC_PORT
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: secret
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/.cache
      - name: daprd
        image: "daprio/daprd:1.12"
        args:
        - "./daprd"
        - "-app-id"
        - "{{SERVICE_NAME}}"
        - "-app-port"
        - "8000"
        - "-dapr-http-port"
        - "3500"
        - "-dapr-grpc-port"
        - "50001"
        - "-log-level"
        - "info"
        - "-enable-profiling"
        - "-enable-metrics"
        - "-metrics-port"
        - "9090"
        - "-enable-mtls"
        - "-app-max-concurrency"
        - "100"
        - "-resources-path"
        - "/components"
        - "-config"
        - "appconfig"
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{SERVICE_NAME}}
  namespace: learnflow
  labels:
    app: {{SERVICE_NAME}}
spec:
  selector:
    app: {{SERVICE_NAME}}
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{SERVICE_NAME}}-hpa
  namespace: learnflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{SERVICE_NAME}}
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{SERVICE_NAME}}-pdb
  namespace: learnflow
spec:
  minAvailable: 50%
  selector:
    matchLabels:
      app: {{SERVICE_NAME}}