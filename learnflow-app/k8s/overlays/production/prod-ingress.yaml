apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress
  namespace: learnflow
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - learnflow.example.com
    secretName: learnflow-tls
  rules:
  - host: learnflow.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8000
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 8000
      - path: /metrics
        pathType: Prefix
        backend:
          service:
            name: gateway
            port:
              number: 9090
