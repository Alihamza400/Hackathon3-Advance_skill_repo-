# LearnFlow — Production Nginx Config
# Routes /api/* to gateway, everything else to Next.js

upstream nextjs { server 127.0.0.1:3000; }
upstream gateway { server 127.0.0.1:8000; }

server {
    listen 80;
    server_name learnflow.app;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # API proxy to backend gateway
    location /api/ {
        proxy_pass http://gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket support for potential real-time features
    location /ws/ {
        proxy_pass http://gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Frontend static files
    location / {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
