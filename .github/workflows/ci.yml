name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt
      - name: Lint (ruff)
        run: ruff check src/
      - name: Run tests
        run: pytest src/tests/
      - name: Build Docker image
        run: |
          docker build -t learnflow-app:ci src/
      - name: Deploy to Kind (optional)
        uses: helm/action-install-action@v2
        with:
          helm-version: v3.12.0
          kubernetes-version: v1.28.0
          helm-chart-path: infra/learnflow-app/helm/learnflow-app
          helm-values-path: infra/learnflow-app/helm/learnflow-app/values-production.yaml