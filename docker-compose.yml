services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: learnflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learnflow}
      POSTGRES_DB: learnflow
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./learnflow-app/infra/k8s/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnflow"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  auth:
    build: { context: ./learnflow-app, dockerfile: Dockerfile.service }
    environment:
      SERVICE_NAME: auth
      PORT: 8000
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-learnflow-jwt-secret-key-change-in-production}
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    restart: unless-stopped

  triage:
    build: { context: ./learnflow-app, dockerfile: Dockerfile.service }
    environment: { SERVICE_NAME: triage, PORT: 8000, POSTGRES_HOST: postgres, REDIS_HOST: redis }
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    restart: unless-stopped

  concepts:
    build: { context: ./learnflow-app, dockerfile: Dockerfile.service }
    environment: { SERVICE_NAME: concepts, PORT: 8000, POSTGRES_HOST: postgres, REDIS_HOST: redis }
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    restart: unless-stopped

  code-review:
    build: { context: ./learnflow-app, dockerfile: Dockerfile.service }
    environment: { SERVICE_NAME: code-review, PORT: 8000, POSTGRES_HOST: postgres, REDIS_HOST: redis }
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    restart: unless-stopped

  debug:
    build: { context: ./learnflow-app, dockerfile: Dockerfile.service }
    environment: { SERVICE_NAME: debug, PORT: 8000, POSTGRES_HOST: postgres, REDIS_HOST: redis }
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    restart: unless-stopped

  exercise:
    build: { context: ./learnflow-app, dockerfile: Dockerfile.service }
    environment: { SERVICE_NAME: exercise, PORT: 8000, POSTGRES_HOST: postgres, REDIS_HOST: redis }
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    restart: unless-stopped

  progress:
    build: { context: ./learnflow-app, dockerfile: Dockerfile.service }
    environment: { SERVICE_NAME: progress, PORT: 8000, POSTGRES_HOST: postgres, REDIS_HOST: redis }
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    restart: unless-stopped

  gateway:
    build: { context: ./learnflow-app, dockerfile: Dockerfile.service }
    environment:
      SERVICE_NAME: gateway
      PORT: 8000
      AUTH_URL: http://auth:8000
      TRIAGE_URL: http://triage:8000
      CONCEPTS_URL: http://concepts:8000
      CODE_REVIEW_URL: http://code-review:8000
      DEBUG_URL: http://debug:8000
      EXERCISE_URL: http://exercise:8000
      PROGRESS_URL: http://progress:8000
    depends_on: [auth, triage, concepts, code-review, debug, exercise, progress]
    ports: ["8000:8000"]
    restart: unless-stopped

  frontend:
    build: ./learnflow-app/frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://gateway:8000
    ports: ["3000:3000"]
    depends_on: [gateway]
    restart: unless-stopped

volumes:
  pgdata:
